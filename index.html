<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Club — Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Estilos recuperados de tu diseño original */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f7;--surface:#fff;--blue:#0071e3;--text:#1d1d1f;--border:#d2d2d7;--sh:0 4px 16px rgba(0,0,0,.05)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}

/* Pantalla de Login Estilo Apple */
.login-card{background:#fff;border:1px solid #d2d2d7;border-radius:18px;padding:32px;width:100%;max-width:360px;box-shadow:var(--sh);text-align:center}
.logo-area img{width:80px;height:80px;border-radius:20px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.input-group{text-align:left;margin-bottom:15px}
.input-group label{font-size:11px;font-weight:600;text-transform:uppercase;color:#6e6e73;display:block;margin-bottom:4px}
input{width:100%;padding:12px;border:1px solid #d2d2d7;border-radius:10px;font-size:15px;outline:none;background:#f5f5f7}
.btn-login{width:100%;background:#0071e3;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;margin-top:10px}
.error-msg{background:#fff2f2;color:#c62828;padding:10px;border-radius:8px;font-size:12px;margin-bottom:15px;display:none}
#appShell{display:none; width: 100%; height: 100vh; background: white; position: fixed; inset: 0; padding: 20px;}
</style>
</head>
<body>

<div id="loginScreen" class="login-card">
  <div class="logo-area">
    <img src="https://carlosjaviergaleano1995-coder.github.io/iphone-club/icon-192.png" alt="Logo">
    <h2 style="margin-bottom:4px">iPhone <span style="color:#0071e3">Club</span></h2>
    <p style="font-size:12px;color:#6e6e73;margin-bottom:24px">PANEL DE PRECIOS</p>
  </div>

  <div id="loginError" class="error-msg"></div>

  <div class="input-group">
    <label>Email</label>
    <input id="loginEmail" type="email" placeholder="tu@email.com" value="carlosjaviergaleano.1995@gmail.com">
  </div>
  <div class="input-group">
    <label>Contraseña</label>
    <input id="loginPass" type="password" placeholder="••••••••">
  </div>

  <button class="btn-login" onclick="window.doLogin()">Iniciar sesión</button>
  <p style="font-size:11px;color:#aeaeb2;margin-top:20px;">iPhone Club © 2026</p>
</div>

<div id="appShell">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #d2d2d7; padding-bottom:10px;">
        <h3 style="font-weight:700">iPhone <span style="color:#0071e3">Club</span></h3>
        <button onclick="window.doLogout()" style="color:#0071e3; border:none; background:none; font-weight:600; cursor:pointer">Cerrar Sesión</button>
    </div>
    <div style="padding-top:20px">
        <h4>Bienvenido, <span id="userName">Admin</span></h4>
        <p style="margin-top:10px; color:#6e6e73">El panel está listo para gestionar precios.</p>
        </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

// Tu configuración real
const firebaseConfig = {
  apiKey: "AIzaSyCBsL8sWUtxbG-KIC3ZzObUgKZTqhEMnf0",
  authDomain: "iphone-club-acf61.firebaseapp.com",
  projectId: "iphone-club-acf61",
  storageBucket: "iphone-club-acf61.firebasestorage.app",
  messagingSenderId: "989584681373",
  appId: "1:989584681373:web:2813015fb6f624b8c4f0e2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    const err = document.getElementById('loginError');
    err.textContent = "Error: Datos incorrectos.";
    err.style.display = 'block';
  }
};

window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDoc = await getDoc(doc(db, "users", user.uid)); // Busca tu documento 'amzfxa...'
    if (userDoc.exists() && userDoc.data().role === 'admin') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').style.display = 'block';
      document.getElementById('userName').textContent = userDoc.data().name || "Admin";
    } else {
      alert("No tienes permisos de administrador.");
      await signOut(auth);
    }
  } else {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('appShell').style.display = 'none';
  }
});
</script>
</body>
</html>
