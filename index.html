<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Club — Panel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0071e3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="iPhone Club">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* CSS UNIFICADO Y CORREGIDO */
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f5f5f7;--surface:#fff;--surface2:#f5f5f7;--surface3:#e8e8ed;
            --border:#d2d2d7;--border2:#c7c7cc;--text:#1d1d1f;--text2:#424245;--text3:#6e6e73;
            --blue:#0071e3;--blue2:#0077ed;--green:#34c759;--red:#ff3b30;--gold:#ff9f0a;
            --r:12px;--r-sm:8px;--sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
        }
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
        
        .shell{display:flex;flex-direction:column;min-height:100vh}
        .topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .logo-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
        .logo-name span{color:var(--blue)}
        
        .nav{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto;position:sticky;top:52px;z-index:99}
        .nav-tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
        .nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
        
        .main{flex:1;max-width:900px;margin:0 auto;width:100%;padding:20px 16px 80px}
        .page{display:none}.page.active{display:block}
        
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
        .card-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .card-body{padding:14px 16px}
        
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .14s}
        .btn-primary{background:var(--blue);color:#fff}
        .btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
        .btn-green{background:var(--green);color:#fff}
        .btn-danger{color:var(--red);background:none}

        .preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:12px;line-height:1.6;white-space:pre-wrap;min-height:120px;max-height:400px;overflow-y:auto}
        
        .tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
        .tmpl-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;text-align:center}
        .tmpl-card.active{border-color:var(--blue);background:rgba(0,113,227,0.05)}

        .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
        .list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;position:relative}
        
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1d1d1f;color:#fff;padding:10px 20px;border-radius:20px;transition:transform .3s;z-index:9999}
        .toast.show{transform:translateX(-50%) translateY(0)}

        .f label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
        .f input, .f select, .f textarea{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface2)}
        
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal-overlay.open{display:flex}
        .modal{background:#fff;border-radius:18px;width:100%;max-width:500px;padding:20px}
        
        @media(max-width:580px){ .tmpl-grid{grid-template-columns:1fr 1fr} }
    </style>
</head>
<body>

<div class="shell">
    <div class="topbar">
        <div class="logo-name">iPhone <span>Club</span></div>
        <div>
            <button class="btn btn-ghost" onclick="exportAll()">Backup ⬇</button>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-tab active" id="tab-gen" onclick="goPage('generate')">Generar</button>
        <button class="nav-tab" id="tab-lists" onclick="goPage('lists')">Gestión</button>
        <button class="nav-tab" id="tab-tmpl" onclick="goPage('templates')">Plantillas</button>
        <button class="nav-tab" id="tab-saved" onclick="goPage('saved')">Guardados</button>
    </nav>

    <div class="main">
        <div class="page active" id="page-generate">
            <div style="margin-bottom:20px">
                <p style="font-size:11px; font-weight:700; color:var(--text3); margin-bottom:8px">1 — ELEGÍ UNA LISTA</p>
                <div id="genListPicker" style="display:flex; gap:8px; flex-wrap:wrap"></div>
            </div>
            
            <div style="margin-bottom:20px">
                <p style="font-size:11px; font-weight:700; color:var(--text3); margin-bottom:8px">2 — ELEGÍ UNA PLANTILLA</p>
                <div class="tmpl-grid" id="genTmplPicker"></div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="preview-box" id="genPreview">Seleccioná opciones arriba...</div>
                </div>
                <div class="card-header" style="border-top:1px solid var(--border)">
                    <button class="btn btn-ghost" onclick="saveCurrentMsg()">Guardar 💾</button>
                    <button class="btn btn-green" onclick="copyGenMessage()">Copiar WhatsApp 📋</button>
                </div>
            </div>
        </div>

        <div class="page" id="page-lists">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <h3 id="listTitle">Mis Listas</h3>
                <button class="btn btn-primary" onclick="openNewListModal()">+ Nueva Lista</button>
            </div>
            <div id="listsGrid" class="grid-cards"></div>
            <div id="listDetail" style="display:none">
                <button class="btn btn-ghost" onclick="showListsGrid()" style="margin-bottom:15px">← Volver</button>
                <div id="prodListContainer"></div>
            </div>
        </div>

        <div class="page" id="page-templates">
            <div id="tmplList"></div>
        </div>

        <div class="page" id="page-saved">
            <div id="savedList"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalList">
    <div class="modal">
        <h3 id="modalListTitle">Nueva Lista</h3>
        <div class="f" style="margin-top:15px">
            <label>Nombre</label>
            <input id="listName" placeholder="Ej: Lista Minorista">
        </div>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modalList')">Cancelar</button>
            <button class="btn btn-primary" style="flex:1" onclick="saveListModal()">Guardar</button>
        </div>
    </div>
</div>

<script>
    /* LÓGICA DE 1400 LÍNEAS ADAPTADA */
    let DB = load();
    let activeListId = null;
    let genListId = null;
    let genTmplId = null;

    function load() {
        const r = localStorage.getItem('ic_local_v1');
        if (r) return JSON.parse(r);
        return {
            lists: [
                {id: 'l1', name: 'iPhone Club', emoji: '📱', products: [
                    {id: 'p1', name: 'iPhone 15 128GB', price: 850, stock: true},
                    {id: 'p2', name: 'iPhone 15 Pro Max', price: 1200, stock: true}
                ]}
            ],
            templates: [
                {id: 't1', name: 'Estándar', emoji: '📱', title: '*IPHONE CLUB*', bullet: '•', footer: '📍 Envios a todo el país'}
            ],
            saved: []
        };
    }

    function save() {
        localStorage.setItem('ic_local_v1', JSON.stringify(DB));
    }

    function goPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
        if (id === 'generate') renderGenerate();
        if (id === 'lists') renderListsGrid();
    }

    // --- GENERADOR ---
    function renderGenerate() {
        const picker = document.getElementById('genListPicker');
        picker.innerHTML = DB.lists.map(l => `
            <button class="btn ${genListId === l.id ? 'btn-primary' : 'btn-ghost'}" onclick="selectGenList('${l.id}')">
                ${l.name}
            </button>
        `).join('');

        const tmplPicker = document.getElementById('genTmplPicker');
        tmplPicker.innerHTML = DB.templates.map(t => `
            <div class="tmpl-card ${genTmplId === t.id ? 'active' : ''}" onclick="selectGenTmpl('${t.id}')">
                <div style="font-size:20px">${t.emoji}</div>
                <div style="font-size:12px; font-weight:600">${t.name}</div>
            </div>
        `).join('');

        updatePreview();
    }

    function selectGenList(id) { genListId = id; renderGenerate(); }
    function selectGenTmpl(id) { genTmplId = id; renderGenerate(); }

    function updatePreview() {
        const preview = document.getElementById('genPreview');
        const list = DB.lists.find(l => l.id === genListId);
        const tmpl = DB.templates.find(t => t.id === genTmplId);
        
        if (!list || !tmpl) return;

        let msg = `${tmpl.title}\n\n`;
        list.products.filter(p => p.stock).forEach(p => {
            msg += `${tmpl.bullet} ${p.name} — *$${p.price}*\n`;
        });
        msg += `\n${tmpl.footer}`;
        preview.innerText = msg;
    }

    function copyGenMessage() {
        const txt = document.getElementById('genPreview').innerText;
        navigator.clipboard.writeText(txt);
        toast('📋 ¡Copiado!');
    }

    // --- GESTIÓN ---
    function renderListsGrid() {
        const grid = document.getElementById('listsGrid');
        grid.innerHTML = DB.lists.map(l => `
            <div class="list-card" onclick="openList('${l.id}')">
                <strong>${l.name}</strong>
                <p style="font-size:11px; color:#6e6e73">${l.products.length} productos</p>
                <button class="btn btn-danger" onclick="event.stopPropagation(); deleteList('${l.id}')" style="position:absolute; top:10px; right:10px">🗑</button>
            </div>
        `).join('');
    }

    function openList(id) {
        activeListId = id;
        document.getElementById('listsGrid').style.display = 'none';
        document.getElementById('listDetail').style.display = 'block';
        const list = DB.lists.find(l => l.id === id);
        document.getElementById('prodListContainer').innerHTML = `
            <h4>${list.name}</h4>
            <div style="margin-top:15px">
                ${list.products.map(p => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee">
                        <span>${p.name}</span>
                        <strong>$${p.price}</strong>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function showListsGrid() {
        document.getElementById('listsGrid').style.display = 'grid';
        document.getElementById('listDetail').style.display = 'none';
    }

    // --- MODALES Y UTILS ---
    function openNewListModal() { document.getElementById('modalList').classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function saveListModal() {
        const name = document.getElementById('listName').value;
        if (!name) return;
        DB.lists.push({ id: 'l'+Date.now(), name: name, products: [] });
        save();
        closeModal('modalList');
        renderListsGrid();
    }

    function deleteList(id) {
        if (!confirm('¿Eliminar esta lista?')) return;
        DB.lists = DB.lists.filter(l => l.id !== id);
        save();
        renderListsGrid();
    }

    function toast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function exportAll() {
        const blob = new Blob([JSON.stringify(DB)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'backup_iphone_club.json';
        a.click();
    }

    // Inicio
    window.onload = () => {
        genListId = DB.lists[0]?.id;
        genTmplId = DB.templates[0]?.id;
        renderGenerate();
    };
</script>
</body>
</html>
