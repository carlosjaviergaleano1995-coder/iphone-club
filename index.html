<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Club — Panel</title>
    <style>
        /* Agregamos el parche de seguridad */
        #loginScreen { position: fixed; inset: 0; z-index: 10000; background: #f5f5f7; display: flex; align-items: center; justify-content: center; }
        .shell { display: none; } /* Oculto hasta que el login sea exitoso */
    </style>
</head>
<body>

<div id="loginScreen">
  <div style="text-align:center; background:white; padding:40px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:100%; max-width:350px;">
    <img src="icon-192.png" width="80" style="border-radius:18px; margin-bottom:20px;">
    <h2 style="font-family:Inter, sans-serif; margin-bottom:20px;">iPhone <span style="color:#0071e3;">Club</span></h2>
    <div id="loginError" style="display:none; color:red; font-size:12px; margin-bottom:10px;"></div>
    <input id="loginEmail" type="email" placeholder="Email" value="carlosjaviergaleano.1995@gmail.com" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <input id="loginPass" type="password" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px;">
    <button id="loginBtn" style="width:100%; background:#0071e3; color:white; border:none; padding:14px; border-radius:10px; font-weight:600; cursor:pointer;">Entrar al Panel</button>
  </div>
</div>

<div class="shell" id="appShell">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBsL8sWUtxbG-KIc3ZzObUgKZTqhEMnf0",
        authDomain: "iphone-club-acf61.firebaseapp.com",
        projectId: "iphone-club-acf61",
        storageBucket: "iphone-club-acf61.firebasestorage.app",
        messagingSenderId: "989584681373",
        appId: "1:989584681373:web:2813015fb6f624b8c4f0e2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Hacer funciones accesibles globalmente para los onclick
    window.doLogin = () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const err = document.getElementById('loginError');
        signInWithEmailAndPassword(auth, email, pass).catch(e => {
            err.textContent = "Error: Credenciales inválidas";
            err.style.display = "block";
        });
    };

    window.doLogout = () => signOut(auth);

    // Vincular el botón manualmente para evitar errores de scope
    document.getElementById('loginBtn').addEventListener('click', window.doLogin);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists() && userDoc.data().role === 'admin') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appShell').style.display = 'flex';
                // Lanzar tus funciones originales si existen
                if (typeof renderGenerate === 'function') renderGenerate();
            } else {
                alert("No tienes permiso de Administrador.");
                signOut(auth);
            }
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appShell').style.display = 'none';
        }
    });
</script>

<script>
    let DB = load();

function load(){
  try{
    const r = localStorage.getItem('ic_v5');
    if(r) return JSON.parse(r);
  }catch{}
  return {
    lists: structuredClone(DEFAULT_LISTS),
    templates: structuredClone(DEFAULT_TEMPLATES),
    saved: [],
    genState: { listId: 'l_iphone', tmplId: 't_default', type:'min', cats:[] }
  };
}
function save(){ localStorage.setItem('ic_v5', JSON.stringify(DB)) }

// ════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════
function goPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  gv('page-'+id).classList.add('active');
  document.querySelector(`[data-page="${id}"]`).classList.add('active');
  if(id==='generate') renderGenerate();
  if(id==='lists'){ showListsGrid(); }
  if(id==='templates') renderTemplates();
  if(id==='saved') renderSaved();
}

// ════════════════════════════════════════════════════════
// GENERATE PAGE
// ════════════════════════════════════════════════════════
let genType = 'min';
let genListId = null;
let genTmplId = null;
let genCats = [];

function renderGenerate(){
  renderGenListPicker();
  renderGenTmplPicker();
  renderGenCatSelector();
  updatePreview();
}

function renderGenListPicker(){
  const el = gv('genListPicker'); if(!el) return;
  el.innerHTML = DB.lists.map(l=>`
    <button class="btn btn-${l.id===genListId?'primary':'ghost'} btn-sm" onclick="selectGenList('${l.id}')">
      ${l.emoji} ${l.name}
    </button>`).join('');
}

function selectGenList(id){
  genListId=id;
  const list = DB.lists.find(l=>l.id===id);
  genCats = list ? list.products.map(p=>p.id) : [];
  renderGenListPicker();
  renderGenCatSelector();
  updatePreview();
}

function renderGenTmplPicker(){
  const el = gv('genTmplPicker'); if(!el) return;
  el.innerHTML = DB.templates.map(t=>`
    <div class="tmpl-card ${t.id===genTmplId?'active':''}" onclick="selectGenTmpl('${t.id}')">
      <span class="t-emoji">${t.emoji}</span>
      <div class="t-name">${t.name}</div>
    </div>`).join('');
}

function selectGenTmpl(id){ genTmplId=id; renderGenTmplPicker(); updatePreview(); }

function setGenType(type,btn){
  genType=type;
  document.querySelectorAll('#genTypeSeg .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGenCatSelector();
  updatePreview();
}

function renderGenCatSelector(){
  const sec = gv('genCatSelector');
  const list = DB.lists.find(l=>l.id===genListId);
  if(!list || genType==='free'){ if(sec) sec.style.display='none'; return; }
  if(sec) sec.style.display='block';
  const label = gv('genSelLabel');
  if(label) label.textContent = genType==='min' ? '🟢 Minorista — categorías' : '🟡 Mayorista — categorías';
  const el = gv('genCatChecks'); if(!el) return;
  // Group products by emoji as proxy for category
  const byEmoji = {};
  list.products.filter(p=>p.stock).forEach(p=>{
    const key = p.emoji+' '+p.extra||'';
    if(!byEmoji[key]) byEmoji[key]={ids:[],count:0};
    byEmoji[key].ids.push(p.id);
    byEmoji[key].count++;
  });
  // Just show all products individually, grouped display
  const inStock = list.products.filter(p=>p.stock);
  el.innerHTML = inStock.map(p=>{
    const on = genCats.includes(p.id);
    const cls = genType==='may' ? 'gold' : '';
    return `<div class="cat-check ${on?'on':''} ${on&&genType==='may'?'gold':''}" onclick="toggleGenCat('${p.id}',this,'${genType}')">
      <div class="check-box">${on?'✓':''}</div>
      <span class="check-label">${p.emoji} ${esc(p.name)}</span>
    </div>`;
  }).join('');
}

function toggleGenCat(id,el,type){
  const i=genCats.indexOf(id);
  if(i>=0) genCats.splice(i,1); else genCats.push(id);
  el.classList.toggle('on');
  const cls = type==='may'?'gold':'';
  if(el.classList.contains('on')) el.classList.add(cls||''); else el.classList.remove('gold');
  const box=el.querySelector('.check-box');
  box.textContent=el.classList.contains('on')?'✓':'';
  updatePreview();
}

function genSelectAll(){
  const list=DB.lists.find(l=>l.id===genListId);
  if(!list)return;
  genCats=list.products.filter(p=>p.stock).map(p=>p.id);
  renderGenCatSelector(); updatePreview();
}
function genSelectNone(){ genCats=[]; renderGenCatSelector(); updatePreview(); }

function buildMessage(listId, tmplId, type){
  const list = DB.lists.find(l=>l.id===listId);
  const tmpl = DB.templates.find(t=>t.id===tmplId);
  if(!list||!tmpl) return 'Elegí una lista y una plantilla.';

  const today = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const sub = (tmpl.subtitle||'').replace('{{fecha}}',today).replace('{{lista}}',list.name);

  if(type==='free') return `${tmpl.line}\n${tmpl.title}\n${sub}\n${tmpl.line}\n\n[Escribí tu mensaje acá]\n\n${tmpl.line}\n_${tmpl.closeMsg}_${tmpl.footer?'\n'+tmpl.footer:''}`;

  const isMay = type==='may';
  const prods = list.products.filter(p=>p.stock && (genCats.length===0||genCats.includes(p.id)));

  if(!prods.length) return 'Sin productos con stock seleccionados.';

  let msg='';

  if(!isMay){
    // MINORISTA — con estética de plantilla
    msg+=`${tmpl.line}\n${tmpl.title}\n${sub}\n${tmpl.line}\n\n`;
    prods.forEach(p=>{
      const bat=p.battery?` 🔋${p.battery}%`:'';
      const nota=p.note?` _(${p.note})_`:'';
      const extra=p.extra?` [${p.extra}]`:'';
      let price='';
      if(list.priceMode==='usd_dual') price=fmtUSD((p.may||0)+20);
      else if(list.priceMode==='usd_single') price=fmtUSD(p.may||0);
      else if(list.priceMode==='ars_dual') price=`${fmtARS(p.may)} (c/cel: ${fmtARS(p.alt)})`;
      else price=fmtARS(p.may||0);
      msg+=`${tmpl.bullet} ${p.name}${nota}${extra}${bat} — *${price}*\n`;
    });
    msg+='\n';
    if(list.conditions.length){
      msg+=`💳 *Condiciones de pago*\n`;
      list.conditions.forEach(c=>{ msg+=`${tmpl.bullet} ${c.label}: ${c.value}\n`; });
      msg+='\n';
    }
    msg+=`${tmpl.line}\n`;
    msg+=`📍 Entrega inmediata · Consultanos por disponibilidad\n`;
    msg+=`✅ Garantía oficial Apple en productos nuevos\n`;
    msg+=`_${tmpl.closeMsg}_`;
    if(tmpl.footer) msg+=`\n${tmpl.footer}`;
  } else {
    // MAYORISTA — sin decoración temática, limpio
    msg+=`📦 *${list.name.toUpperCase()} — MAYORISTA*\n`;
    msg+=`📅 ${today}\n\n`;
    prods.forEach(p=>{
      const bat=p.battery?` 🔋${p.battery}%`:'';
      const nota=p.note?` _(${p.note})_`:'';
      let price='';
      if(list.priceMode==='usd_dual') price=fmtUSD(p.may||0);
      else if(list.priceMode==='usd_single') price=fmtUSD(p.may||0);
      else if(list.priceMode==='ars_dual') price=fmtARS(p.alt||0);
      else price=fmtARS(p.may||0);
      msg+=`• ${p.emoji} ${p.name}${nota}${bat} — *${price}*\n`;
    });
    msg+='\n';
    if(list.hasDiscount && list.disc1From){
      msg+=`💰 *Descuentos por volumen*\n`;
      msg+=`▸ Más de ${fmtARS(list.disc1From)} → ${list.disc1Pct}% OFF\n`;
      if(list.disc2From) msg+=`▸ Más de ${fmtARS(list.disc2From)} → ${list.disc2Pct}% OFF\n`;
      msg+='\n';
    }
    if(list.conditions.length){
      msg+=`💳 *Condiciones de pago*\n`;
      list.conditions.forEach(c=>{ msg+=`• ${c.label}: ${c.value}\n`; });
      msg+='\n';
    }
    if(list.minOrder) msg+=`📦 Compra mínima: ${fmtARS(list.minOrder)}\n`;
    msg+=`📍 Oficina disponible para atender a tus clientes\n`;
    msg+=`📲 Consultanos por disponibilidad y volumen\n`;
    msg+=`_Cualquier otro modelo consultame._`;
  }

  return msg;
}

function updatePreview(){
  const el=gv('genPreview'); if(!el) return;
  if(!genListId||!genTmplId){ el.textContent='Elegí una lista y una plantilla para ver la vista previa.'; return; }
  el.textContent = buildMessage(genListId,genTmplId,genType);
}

function copyGenMessage(){
  if(!genListId||!genTmplId){ toast('⚠️ Elegí lista y plantilla','red'); return; }
  const msg = buildMessage(genListId,genTmplId,genType);
  navigator.clipboard.writeText(msg).then(()=>{
    toast('📋 Mensaje copiado!','green');
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('📋 Copiado!','green');
  });
}

function saveCurrentMsg(){
  const content = gv('genPreview')?.textContent||'';
  if(!content||content.startsWith('Elegí')){ toast('⚠️ Generá un mensaje primero','red'); return; }
  gv('saveMsgContent').value = content;
  gv('saveMsgName').value = '';
  gv('saveMsgTags').innerHTML='';
  pendingTags=[];
  openModal('modalSaveMsg');
}

// LISTS PAGE
// ════════════════════════════════════════════════════════
let activeListId = null;
let editingListId = null;

function showListsGrid(){
  gv('listsGrid').style.display='grid';
  gv('listDetail').style.display='none';
  gv('backToListsBtn').style.display='none';
  gv('listDetailBreadcrumb').textContent='';
  activeListId=null;
  renderListsGrid();
}

function renderListsGrid(){
  const el=gv('listsGrid'); if(!el) return;
  el.innerHTML = DB.lists.map(l=>{
    const n=l.products.filter(p=>p.stock).length;
    return `<div class="list-card" onclick="openListDetail('${l.id}')">
      <div class="list-card-actions">
        <button class="btn btn-icon btn-xs" onclick="event.stopPropagation();openEditListModal('${l.id}')">✏️</button>
        <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteList('${l.id}')">🗑</button>
      </div>
      <div class="list-card-emoji">${l.emoji}</div>
      <div class="list-card-name">${esc(l.name)}</div>
      <div class="list-card-sub">${esc(l.desc||'')}</div>
      <div style="margin-top:10px;display:flex;gap:6px;align-items:center;">
        <span class="badge badge-${l.color||'gray'}">${n} con stock</span>
        <span class="badge badge-gray">${l.priceMode}</span>
      </div>
    </div>`;
  }).join('') + `<div class="list-card" style="border-style:dashed;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;" onclick="openNewListModal()">
    <div style="font-size:28px;margin-bottom:6px;">➕</div>
    <div style="font-size:13px;font-weight:500;color:var(--text3);">Nueva lista</div>
  </div>`;
}

function openListDetail(id){
  activeListId=id;
  const list=DB.lists.find(l=>l.id===id); if(!list) return;
  gv('listsGrid').style.display='none';
  gv('listDetail').style.display='block';
  gv('backToListsBtn').style.display='inline-flex';
  gv('listDetailBreadcrumb').textContent=`${list.emoji} ${list.name}`;
  gv('detailListTitle').innerHTML=`${list.emoji} <span style="font-weight:700">${esc(list.name)}</span> <span class="badge badge-${list.color||'gray'}">${list.priceMode}</span>`;
  renderDetailProds();
  renderDetailConds();
  renderDetailDiscount();
}

function renderDetailProds(){
  const list=DB.lists.find(l=>l.id===activeListId); if(!list) return;
  const el=gv('detailProdList'); if(!el) return;
  if(!list.products.length){ el.innerHTML='<div class="empty">Sin productos.</div>'; return; }
  el.innerHTML=list.products.map(p=>prodRowHTML(p,list.priceMode)).join('');
}

function prodRowHTML(p,mode){
  let priceHTML='';
  if(mode==='usd_dual') priceHTML=`<span class="price-pill pp-min">MIN ${fmtUSD((p.may||0)+20)}</span><span class="price-pill pp-may">MAY ${fmtUSD(p.may||0)}</span>`;
  else if(mode==='usd_single') priceHTML=`<span class="price-pill pp-s">${fmtUSD(p.may||0)}</span>`;
  else if(mode==='ars_dual') priceHTML=`<span class="price-pill pp-min">Solo: ${fmtARS(p.may)}</span><span class="price-pill pp-may">+Cel: ${fmtARS(p.alt)}</span>`;
  else priceHTML=`<span class="price-pill pp-s">${fmtARS(p.may||0)}</span>`;
  const bat=p.battery?`<span style="font-size:10px;">🔋${p.battery}%</span>`:'';
  const extra=p.extra?`<span class="badge badge-gray">${esc(p.extra)}</span>`:'';

  return `<div>
    <div class="prod-row ${p.stock?'':'no-stock'}">
      <div class="prod-main">
        <div class="prod-name">${p.emoji||''} ${esc(p.name)}</div>
        <div class="prod-sub">${priceHTML}${bat}${extra}
          ${p.stock?'<span class="stock-on">✓ Stock</span>':'<span class="stock-off">✗ Sin stock</span>'}
          ${p.note?`<span style="color:var(--text4);font-size:11px;">${esc(p.note)}</span>`:''}
        </div>
      </div>
      <div class="prod-actions" style="display:flex;gap:4px;flex-shrink:0;">
        <button class="btn btn-icon" onclick="toggleProdEdit('${p.id}')">✏️</button>
        <button class="btn btn-danger" onclick="deleteProd('${activeListId}','${p.id}')">🗑</button>
      </div>
    </div>
    <div class="edit-form" id="pef_${p.id}">${prodEditHTML(p,mode)}</div>
  </div>`;
}

function prodEditHTML(p,mode){
  const isMayOnly = mode==='usd_single'||mode==='ars_single';
  const isARS = mode.startsWith('ars');
  return `
    <div class="eg eg2" style="margin-bottom:8px;">
      <div class="f"><label>Emoji</label><input id="pe_emo_${p.id}" value="${esc(p.emoji||'')}" style="max-width:70px;"></div>
      <div class="f"><label>Nombre</label><input id="pe_name_${p.id}" value="${esc(p.name)}"></div>
    </div>
    <div class="eg eg${isMayOnly?'2':'3'}" style="margin-bottom:8px;">
      <div class="f"><label>${isMayOnly?(isARS?'Precio $ARS':'Precio USD'):(isARS?'Precio solo $ARS':'Precio MAY USD')}</label>
        <input id="pe_may_${p.id}" type="number" value="${p.may||0}"></div>
      ${!isMayOnly?`<div class="f"><label>${isARS?'Precio con celular $ARS':'(Minorista = +$20 auto)'}</label>
        <input id="pe_alt_${p.id}" type="number" value="${p.alt||0}" ${mode==='usd_dual'?'disabled placeholder="auto"':''}></div>`:''}
      <div class="f"><label>Batería %</label><input id="pe_bat_${p.id}" type="number" value="${p.battery||''}"></div>
    </div>
    <div class="eg eg3" style="margin-bottom:8px;">
      <div class="f"><label>Stock</label><select id="pe_st_${p.id}">
        <option value="1" ${p.stock?'selected':''}>✓ Disponible</option>
        <option value="0" ${!p.stock?'selected':''}>✗ Sin stock</option>
      </select></div>
      <div class="f"><label>Nota</label><input id="pe_note_${p.id}" value="${esc(p.note||'')}"></div>
      <div class="f"><label>Extra / categoría</label><input id="pe_extra_${p.id}" value="${esc(p.extra||'')}"></div>
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end;">
      <button class="btn btn-ghost btn-sm" onclick="closeProdEdit('${p.id}')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="saveProdEdit('${activeListId}','${p.id}','${mode}')">Guardar</button>
    </div>`;
}

function toggleProdEdit(id){
  const ef=gv('pef_'+id);
  const was=ef.classList.contains('open');
  document.querySelectorAll('.edit-form.open').forEach(e=>e.classList.remove('open'));
  if(!was) ef.classList.add('open');
}
function closeProdEdit(id){ gv('pef_'+id)?.classList.remove('open') }

function saveProdEdit(listId,prodId,mode){
  const list=DB.lists.find(l=>l.id===listId); if(!list) return;
  const p=list.products.find(x=>x.id===prodId); if(!p) return;
  p.emoji  = v('pe_emo_'+prodId)||p.emoji;
  p.name   = v('pe_name_'+prodId)||p.name;
  p.may    = parseFloat(gv('pe_may_'+prodId)?.value)||0;
  p.alt    = parseFloat(gv('pe_alt_'+prodId)?.value)||0;
  p.battery= gv('pe_bat_'+prodId)?.value?.trim()||'';
  p.stock  = gv('pe_st_'+prodId)?.value==='1';
  p.note   = v('pe_note_'+prodId);
  p.extra  = v('pe_extra_'+prodId);
  save(); renderDetailProds(); toast('✅ Guardado','green');
}

function deleteProd(listId,prodId){
  if(!confirm('¿Eliminar producto?'))return;
  const list=DB.lists.find(l=>l.id===listId); if(!list) return;
  list.products=list.products.filter(p=>p.id!==prodId);
  save(); renderDetailProds(); toast('🗑 Eliminado');
}

function openAddProd(){
  const list=DB.lists.find(l=>l.id===activeListId); if(!list) return;
  const form=gv('addProdForm'); if(!form) return;
  const mode=list.priceMode;
  const isMayOnly=mode==='usd_single'||mode==='ars_single';
  const isARS=mode.startsWith('ars');
  form.classList.add('open');
  form.innerHTML=`<div class="add-form-title">Nuevo producto</div>
    <div class="eg eg2" style="margin-bottom:8px;">
      <div class="f"><label>Emoji</label><input id="np_emo" placeholder="📱" style="max-width:70px;"></div>
      <div class="f"><label>Nombre</label><input id="np_name" placeholder="Nombre del producto"></div>
    </div>
    <div class="eg eg${isMayOnly?'2':'3'}" style="margin-bottom:8px;">
      <div class="f"><label>${isMayOnly?(isARS?'Precio $ARS':'Precio USD'):(isARS?'Precio solo':'Precio MAY')}</label>
        <input id="np_may" type="number" placeholder="0"></div>
      ${!isMayOnly&&!( mode==='usd_dual')?`<div class="f"><label>${isARS?'Con celular':''}</label><input id="np_alt" type="number" placeholder="0"></div>`:''}
      <div class="f"><label>Batería %</label><input id="np_bat" type="number" placeholder=""></div>
    </div>
    <div class="eg eg3" style="margin-bottom:8px;">
      <div class="f"><label>Stock</label><select id="np_st"><option value="1">✓ Disponible</option><option value="0">✗ Sin stock</option></select></div>

function confirmAddProd(listId,mode){
  const name=v('np_name'); if(!name){toast('⚠️ Falta el nombre','red');return;}
  const list=DB.lists.find(l=>l.id===listId); if(!list) return;
  list.products.push({
    id:uid(), emoji:v('np_emo')||'▸', name,
    may:parseFloat(gv('np_may')?.value)||0,
    alt:parseFloat(gv('np_alt')?.value)||0,
    battery:gv('np_bat')?.value?.trim()||'',
    stock:gv('np_st')?.value==='1',
    note:v('np_note'), extra:v('np_extra')
  });
  save(); renderDetailProds(); gv('addProdForm').classList.remove('open');

}

function renderDetailConds(){

      <input value="${esc(c.value)}" onchange="updateListCond('${activeListId}',${i},this.value)">
    </div>`).join('');
}
function updateListCond(lid,i,val){ const l=DB.lists.find(x=>x.id===lid); if(l){l.conditions[i].value=val;save();} }
function removeListCond(lid,i){ const l=DB.lists.find(x=>x.id===lid); if(l){l.conditions.splice(i,1);save();renderDetailConds();} }
function addListCond(){
  const list=DB.lists.find(l=>l.id===activeListId); if(!list) return;
  const label=prompt('Método de pago:'); if(!label) return;
  const value=prompt('Condición:'); if(!value) return;
  list.conditions.push({id:uid(),label,value}); save(); renderDetailConds();
}

function renderDetailDiscount(){
  const list=DB.lists.find(l=>l.id===activeListId); if(!list) return;

      <div class="f"><label>Descuento 2 — desde</label><input type="number" value="${list.disc2From||0}" onchange="updateDisc('${list.id}','disc2From',this.value)"></div>

function updateDisc(lid,field,val){ const l=DB.lists.find(x=>x.id===lid); if(l){l[field]=parseFloat(val)||0;save();} }

// SAVED MESSAGES
// ════════════════════════════════════════════════════════
let filterTag=null;
let pendingTags=[];

const TAG_COLORS=['blue','green','gold','purple','red'];
function tagColor(tag){
  let h=0; for(let c of tag) h=(h*31+c.charCodeAt(0))&0xffffff;
  return TAG_COLORS[Math.abs(h)%TAG_COLORS.length];
}

function renderSaved(){
  // tag filter
  const allTags=[...new Set(DB.saved.flatMap(m=>m.tags||[]))];
  const tf=gv('tagFilter'); if(tf){
    tf.innerHTML=`<span class="tag ${!filterTag?'tag-blue':''}" onclick="setTagFilter(null)" style="cursor:pointer;">Todos</span>`
    +allTags.map(t=>`<span class="tag tag-${tagColor(t)} ${filterTag===t?'':'opacity: .7'}" onclick="setTagFilter('${t}')" style="cursor:pointer;">${esc(t)}</span>`).join('');
  }
  const el=gv('savedList'); if(!el) return;
  const msgs=filterTag ? DB.saved.filter(m=>(m.tags||[]).includes(filterTag)) : DB.saved;
  if(!msgs.length){ el.innerHTML='<div class="empty"><div class="empty-icon">💬</div>Ningún mensaje guardado todavía.</div>'; return; }
  el.innerHTML=[...msgs].reverse().map(m=>`
    <div class="msg-card">
      <div class="msg-card-header">
        <div class="msg-card-title">${esc(m.name)}</div>
        <button class="btn btn-danger btn-xs" onclick="deleteSaved('${m.id}')">🗑</button>
      </div>
      <div class="msg-card-tags">${(m.tags||[]).map(t=>`<span class="tag tag-${tagColor(t)}">${esc(t)}</span>`).join('')}</div>
      <div class="msg-card-preview">${esc(m.content)}</div>
      <div class="msg-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="copySaved('${m.id}')">📋 Copiar</button>
        <button class="btn btn-ghost btn-sm" onclick="editSaved('${m.id}')">✏️ Editar</button>
      </div>
    </div>`).join('');
}
function setTagFilter(t){ filterTag=t; renderSaved(); }

function openNewSavedModal(){
  gv('saveMsgName').value='';
  gv('saveMsgContent').value='';
  gv('saveMsgTags').innerHTML='';
  pendingTags=[];
  openModal('modalSaveMsg');
}
function addTagOnEnter(e){
  if(e.key!=='Enter'&&e.key!==',') return;
  e.preventDefault();
  const tag=v('saveMsgTagInput'); if(!tag) return;
  if(!pendingTags.includes(tag)) pendingTags.push(tag);
  gv('saveMsgTagInput').value='';
  renderPendingTags();
}
function removeTag(t){ pendingTags=pendingTags.filter(x=>x!==t); renderPendingTags(); }
function renderPendingTags(){
  gv('saveMsgTags').innerHTML=pendingTags.map(t=>`<span class="tag tag-${tagColor(t)}">${esc(t)} <span class="tag-x" onclick="removeTag('${t}')">✕</span></span>`).join('');
}
function confirmSaveMsg(){
  const name=v('saveMsgName'); if(!name){toast('⚠️ Ponele un nombre','red');return;}
  const content=gv('saveMsgContent').value.trim(); if(!content){toast('⚠️ Falta el contenido','red');return;}
  // check if extra tag from input
  const extra=v('saveMsgTagInput');
  if(extra&&!pendingTags.includes(extra)) pendingTags.push(extra);
  const newMsg = {name,tags:[...pendingTags],content,ts:Date.now()};
  const fireId = await saveUserMessage(newMsg);
  newMsg.id = fireId||uid();
  DB.saved.push(newMsg);
  saveLocal(); closeModal('modalSaveMsg');
  toast('💾 Mensaje guardado','blue');
  renderSaved();
}
function copySaved(id){
  const m=DB.saved.find(x=>x.id===id); if(!m) return;
  navigator.clipboard.writeText(m.content).then(()=>toast('📋 Copiado!','green'))
    .catch(()=>{const ta=document.createElement('textarea');ta.value=m.content;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 Copiado!','green');});
}
function editSaved(id){
  const m=DB.saved.find(x=>x.id===id); if(!m) return;
  pendingTags=[...(m.tags||[])];
  gv('saveMsgName').value=m.name;
  gv('saveMsgContent').value=m.content;
  renderPendingTags();
  openModal('modalSaveMsg');
  // override confirm to update
  gv('modalSaveMsg').querySelector('.modal-footer .btn-primary').onclick=()=>{
    const name=v('saveMsgName'); if(!name) return;
    m.name=name; m.content=gv('saveMsgContent').value.trim();
    const extra=v('saveMsgTagInput');
    if(extra&&!pendingTags.includes(extra)) pendingTags.push(extra);
    m.tags=[...pendingTags];
    save(); closeModal('modalSaveMsg'); renderSaved();
    toast('✅ Actualizado','green');
    gv('modalSaveMsg').querySelector('.modal-footer .btn-primary').onclick=confirmSaveMsg;
  };
}
async function deleteSaved(id){
  if(!confirm('¿Eliminar?'))return;
  await deleteUserMessage(id);
  DB.saved=DB.saved.filter(m=>m.id!==id);
  saveLocal(); renderSaved(); toast('🗑 Eliminado');
}

function exportAll(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='iphone_club_v5.json';a.click();
  toast('⬇ Backup exportado');
}
function importAll(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.lists&&d.templates){DB=d;save();goPage('generate');toast('✅ Importado!','green');}
        else toast('⚠️ Archivo inválido','red');
      }catch{toast('⚠️ Error al leer','red');}
    };r.readAsText(f);
  };inp.click();
}
