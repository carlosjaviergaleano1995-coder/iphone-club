<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Club — Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Estilos simplificados para el login de iPhone Club */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f7;color:#1d1d1f;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border:1px solid #d2d2d7;border-radius:18px;padding:32px;width:100%;max-width:360px;box-shadow:0 10px 30px rgba(0,0,0,0.05);text-align:center}
.logo-area img{width:80px;height:80px;border-radius:20px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.input-group{text-align:left;margin-bottom:15px}
.input-group label{font-size:11px;font-weight:600;text-transform:uppercase;color:#6e6e73;display:block;margin-bottom:4px}
input{width:100%;padding:12px;border:1px solid #d2d2d7;border-radius:10px;font-size:15px;outline:none}
input:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,0.1)}
.btn-login{width:100%;background:#0071e3;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;margin-top:10px}
.btn-google{width:100%;background:#fff;color:#1d1d1f;border:1px solid #d2d2d7;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:10px}
.error-msg{background:#fff2f2;color:#c62828;padding:10px;border-radius:8px;font-size:12px;margin-bottom:15px;display:none}
#appShell{display:none} /* Oculto hasta que loguee */
</style>
</head>
<body>

<div id="loginScreen" class="login-card">
  <div class="logo-area">
    <img src="https://carlosjaviergaleano1995-coder.github.io/iphone-club/icon-192.png" alt="Logo">
    <h2 style="margin-bottom:4px">iPhone <span style="color:#0071e3">Club</span></h2>
    <p style="font-size:12px;color:#6e6e73;margin-bottom:24px">PANEL DE PRECIOS</p>
  </div>

  <div id="loginError" class="error-msg"></div>

  <div class="input-group">
    <label>Email</label>
    <input id="loginEmail" type="email" placeholder="tu@email.com">
  </div>
  <div class="input-group">
    <label>Contraseña</label>
    <input id="loginPass" type="password" placeholder="••••••••">
  </div>

  <button class="btn-login" onclick="window.doLogin()">Iniciar sesión</button>
  
  <div style="margin:16px 0;font-size:12px;color:#aeaeb2">o también</div>

  <button class="btn-google" onclick="window.doGoogleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar con Google
  </button>
</div>

<div id="appShell">
  <div style="padding:20px;text-align:center">
    <h3>Bienvenido al Panel</h3>
    <p id="userDisplay"></p>
    <button onclick="window.doLogout()" style="margin-top:20px">Cerrar Sesión</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBsL8sWUtxbG-KiC3ZzObUgKZTLWRdu8Y",
  authDomain: "iphone-club-acf61.firebaseapp.com",
  projectId: "iphone-club-acf61",
  storageBucket: "iphone-club-acf61.firebasestorage.app",
  messagingSenderId: "989584681373",
  appId: "1:989584681373:web:2813015fb6f62483ba6774"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Función Login Email
window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    showError("Credenciales inválidas o error de conexión.");
  }
};

// Función Login Google
window.doGoogleLogin = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    showError("Error al conectar con Google.");
  }
};

window.doLogout = () => signOut(auth);

function showError(m) {
  const el = document.getElementById('loginError');
  el.textContent = m; el.style.display = 'block';
}

// Observador de Sesión
onAuthStateChanged(auth, async (user) => {
  if (user) {
    // Verificar si existe en la colección 'users' (LA QUE DEBES CREAR)
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').style.display = 'block';
      document.getElementById('userDisplay').textContent = "Hola, " + (userDoc.data().name || user.email);
    } else {
      showError("Acceso denegado: No estás registrado en la base de datos de usuarios.");
      await signOut(auth);
    }
  } else {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('appShell').style.display = 'none';
  }
});
</script>
</body>
</html>
