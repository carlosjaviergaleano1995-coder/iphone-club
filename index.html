<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Club — Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="iPhone Club">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* Estilos originales mantenidos para iPhone Club */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#fff;--surface2:#f5f5f7;--surface3:#e8e8ed;
  --border:#d2d2d7;--border2:#c7c7cc;
  --text:#1d1d1f;--text2:#424245;--text3:#6e6e73;--text4:#aeaeb2;
  --blue:#0071e3;--blue2:#0077ed;--blue-bg:rgba(0,113,227,.08);--blue-ring:rgba(0,113,227,.2);
  --green:#34c759;--green-bg:rgba(52,199,89,.1);
  --red:#ff3b30;--red-bg:rgba(255,59,48,.08);
  --gold:#ff9f0a;--gold-bg:rgba(255,159,10,.1);
  --purple:#af52de;--purple-bg:rgba(175,82,222,.08);
  --r:12px;--r-sm:8px;--r-xs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --sh-sm:0 1px 2px rgba(0,0,0,.06);
}
html{font-size:14px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Estructura del panel */
.shell{display:none;flex-direction:column;min-height:100vh}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:34px;height:34px;border-radius:8px}
.logo-name{font-size:16px;font-weight:700}
.logo-name span{color:var(--blue)}
.nav{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nav-tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.main{flex:1;max-width:900px;margin:0 auto;width:100%;padding:20px 16px 80px}
.page{display:none}.page.active{display:block}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.card-body{padding:14px 16px}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:12px;white-space:pre-wrap;min-height:120px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .14s}
.btn-primary{background:var(--blue);color:#fff}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;border-radius:20px;padding:10px 20px;font-size:13px;z-index:9999;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed;inset:0;z-index:1000;background:#f5f5f7;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:320px;background:#fff;border:1px solid #d2d2d7;border-radius:14px;padding:24px;box-shadow:var(--sh);">
    <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:22px;font-weight:700;">iPhone <span style="color:#0071e3;">Club</span></div>
        <div style="font-size:12px;color:#6e6e73;">Acceso al Panel</div>
    </div>
    <div id="loginError" style="display:none;background:#fff2f2;border:1px solid #ffcdd2;border-radius:8px;padding:10px;font-size:12px;color:#c62828;margin-bottom:14px;"></div>
    
    <button onclick="doGoogleLogin()" id="googleBtn" style="width:100%;background:#fff;color:#1d1d1f;border:1px solid #d2d2d7;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:15px;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar con Google
    </button>
    
    <div style="text-align:center;font-size:11px;color:#aeaeb2;margin-top:10px;">Solo personal autorizado</div>
  </div>
</div>

<div class="shell" id="appShell">
    <div class="topbar">
      <div class="logo">
        <div class="logo-name">iPhone <span>Club</span></div>
      </div>
      <div class="topbar-right">
        <span id="userName" style="font-size:12px;margin-right:10px;color:var(--text3)"></span>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-tab active">📤 Generar Mensaje</button>
      <button class="nav-tab">📋 Mis Listas</button>
    </nav>
    <div class="main">
        <div class="section">
            <div class="section-label">Generador de precios rápida</div>
            <div class="card">
                <div class="card-body">
                    <div class="preview-box" id="genPreview">Bienvenido al panel de iPhone Club.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Tu configuración real obtenida de la consola
const firebaseConfig = {
  apiKey: "AIzaSyCBsL8sWUtxbG-KiC3ZzObUgKZTLWRdu8Y",
  authDomain: "iphone-club-acf61.firebaseapp.com",
  projectId: "iphone-club-acf61",
  storageBucket: "iphone-club-acf61.firebasestorage.app",
  messagingSenderId: "989584681373",
  appId: "1:989584681373:web:2813015fb6f62483ba6774",
  measurementId: "G-YVMLS6G0LJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Función de Login con Google
window.doGoogleLogin = async () => {
    try {
        const result = await signInWithPopup(auth, provider);
        showToast("¡Bienvenido, " + result.user.displayName + "!");
    } catch (error) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = "Error: " + error.message;
    }
};

// Función de Logout
window.doLogout = async () => {
    await signOut(auth);
    showToast("Sesión cerrada");
};

// Observador del estado de autenticación
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('userName').textContent = user.displayName;
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appShell').style.display = 'none';
  }
});

// Utilidad Toast
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

</body>
</html>
