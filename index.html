<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Club — Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="iPhone Club">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   ESTILOS DE LOGIN (APPLE STYLE)
   ════════════════════════════════════════════════════════ */
#loginScreen {
    position: fixed; inset: 0; z-index: 9999; background: #f5f5f7;
    display: flex; align-items: center; justify-content: center; padding: 20px;
}
.login-card {
    background: #fff; border: 1px solid #d2d2d7; border-radius: 18px;
    padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); text-align: center;
}
.login-card img { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.input-group { text-align: left; margin-bottom: 15px; }
.input-group label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #6e6e73; display: block; margin-bottom: 4px; }
.login-input { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 15px; outline: none; background: #f5f5f7; }
.btn-login { width: 100%; background: #0071e3; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.btn-google { width: 100%; background: #fff; color: #1d1d1f; border: 1px solid #d2d2d7; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
.error-msg { background: #fff2f2; color: #c62828; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: none; }

/* ════════════════════════════════════════════════════════
   TUS ESTILOS ORIGINALES
   ════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#fff;--surface2:#f5f5f7;--surface3:#e8e8ed;
  --border:#d2d2d7;--border2:#c7c7cc;
  --text:#1d1d1f;--text2:#424245;--text3:#6e6e73;--text4:#aeaeb2;
  --blue:#0071e3;--blue2:#0077ed;--blue-bg:rgba(0,113,227,.08);--blue-ring:rgba(0,113,227,.2);
  --green:#34c759;--green-bg:rgba(52,199,89,.1);
  --red:#ff3b30;--red-bg:rgba(255,59,48,.08);
  --gold:#ff9f0a;--gold-bg:rgba(255,159,10,.1);
  --purple:#af52de;--purple-bg:rgba(175,82,222,.08);
  --r:12px;--r-sm:8px;--r-xs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#appShell { display: none; flex-direction: column; min-height: 100vh; }

.topbar{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-0.02em}
.logo-name span{color:var(--blue)}
.main{flex:1;max-width:900px;margin:0 auto;width:100%;padding:20px 16px 80px}
.nav-pills{display:flex;gap:6px;background:var(--surface3);padding:4px;border-radius:10px;margin-bottom:24px}
.pill{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;color:var(--text3);transition:0.2s}
.pill.active{background:var(--surface);color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.card-body{padding:14px 16px}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:12px;white-space:pre-wrap;min-height:120px;max-height:400px;overflow-y:auto;font-family:inherit;color:var(--text2);line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:0.2s;user-select:none}
.btn-primary{background:var(--blue);color:#fff}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:1000;display:none;backdrop-filter:blur(10px)}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <img src="https://carlosjaviergaleano1995-coder.github.io/iphone-club/icon-192.png">
    <h2>iPhone <span style="color:#0071e3">Club</span></h2>
    <p style="font-size:12px;color:#6e6e73;margin-bottom:24px">PANEL ADMINISTRATIVO</p>
    <div id="loginError" class="error-msg"></div>
    <div class="input-group">
      <label>Email</label>
      <input id="loginEmail" class="login-input" type="email" value="carlosjaviergaleano.1995@gmail.com">
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <input id="loginPass" class="login-input" type="password" placeholder="••••••••">
    </div>
    <button class="btn-login" onclick="window.doLogin()">Iniciar sesión</button>
    <button class="btn-google" onclick="window.doGoogleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar con Gmail
    </button>
  </div>
</div>

<div class="shell" id="appShell">
    <div class="topbar">
      <div class="logo-name">iPhone <span>Club</span></div>
      <div style="display:flex; align-items:center; gap:12px">
          <button class="btn" style="background:var(--surface3); font-size:11px" onclick="window.doLogout()">Cerrar Sesión</button>
      </div>
    </div>

    <div class="main">
        <div class="nav-pills">
            <div class="pill active" onclick="goPage('generate')">Generar</div>
            <div class="pill" onclick="goPage('lists')">Mis Listas</div>
            <div class="pill" onclick="goPage('templates')">Plantillas</div>
        </div>

        <div id="page-generate" class="page">
            <div class="card">
                <div class="card-body">
                    <div class="preview-box" id="genPreview">Cargando...</div>
                    <div style="margin-top:16px; display:flex; gap:10px">
                        <button class="btn btn-primary" style="flex:1" onclick="copyText()">Copiar Lista</button>
                    </div>
                </div>
            </div>
        </div>
        
        </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBsL8sWUtxbG-KIC3ZzObUgKZTqhEMnf0",
  authDomain: "iphone-club-acf61.firebaseapp.com",
  projectId: "iphone-club-acf61",
  storageBucket: "iphone-club-acf61.firebasestorage.app",
  messagingSenderId: "989584681373",
  appId: "1:989584681373:web:2813015fb6f624b8c4f0e2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.doLogin = () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  signInWithEmailAndPassword(auth, email, pass).catch(() => showError("Email o contraseña incorrectos"));
};

window.doGoogleLogin = () => {
  signInWithPopup(auth, provider).catch(() => showError("Error de conexión con Google"));
};

window.doLogout = () => signOut(auth);

function showError(m) {
  const el = document.getElementById('loginError');
  el.textContent = m; el.style.display = 'block';
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists() && userDoc.data().role === 'admin') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').style.display = 'flex';
      // Iniciar tu lógica original una vez logueado
      if(typeof renderGenerate === 'function') renderGenerate();
    } else {
      showError("Acceso denegado: No eres administrador");
      await signOut(auth);
    }
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appShell').style.display = 'none';
  }
});
</script>

<script>
let DB = JSON.parse(localStorage.getItem('iphone_club_db')) || {
  lists: [{ id: 1, name: 'Lista Base', products: [] }],
  templates: [{ id: 1, name: 'Template Estándar', content: 'Precios del día:\n{{LIST}}' }]
};

function save() { localStorage.setItem('iphone_club_db', JSON.stringify(DB)); }

function goPage(p) {
  document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
  document.getElementById('page-' + p).style.display = 'block';
  document.querySelectorAll('.pill').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
}

function renderGenerate() {
  const preview = document.getElementById('genPreview');
  if(!preview) return;
  preview.textContent = "Aquí aparecerán tus listas generadas...";
}

function copyText() {
  const t = document.getElementById('genPreview').innerText;
  navigator.clipboard.writeText(t);
  toast('✅ Copiado al portapapeles');
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// Service Worker Registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error', err));
  });
}
</script>

</body>
</html>
