<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Club — Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="iPhone Club">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   SISTEMA DE LOGIN (APPLE STYLE)
   ════════════════════════════════════════════════════════ */
#loginScreen { position: fixed; inset: 0; z-index: 9999; background: #f5f5f7; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: #fff; border: 1px solid #d2d2d7; border-radius: 18px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); text-align: center; }
.login-card img { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.input-group { text-align: left; margin-bottom: 15px; }
.input-group label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #6e6e73; display: block; margin-bottom: 4px; }
.login-input { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 15px; outline: none; background: #f5f5f7; }
.btn-login { width: 100%; background: #0071e3; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.btn-google { width: 100%; background: #fff; color: #1d1d1f; border: 1px solid #d2d2d7; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
.error-msg { background: #fff2f2; color: #c62828; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: none; }

/* ════════════════════════════════════════════════════════
   DISEÑO ORIGINAL DE TU HERRAMIENTA
   ════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#fff;--surface2:#f5f5f7;--surface3:#e8e8ed;
  --border:#d2d2d7;--border2:#c7c7cc;
  --text:#1d1d1f;--text2:#424245;--text3:#6e6e73;--text4:#aeaeb2;
  --blue:#0071e3;--blue2:#0077ed;--blue-bg:rgba(0,113,227,.08);--blue-ring:rgba(0,113,227,.2);
  --r:12px; --r-sm:8px; --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#appShell { display: none; flex-direction: column; min-height: 100vh; }
.topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-name{font-size:16px;font-weight:700}
.logo-name span{color:var(--blue)}
.main{flex:1;max-width:900px;margin:0 auto;width:100%;padding:20px 16px 80px}
.nav-pills{display:flex;gap:6px;background:var(--surface3);padding:4px;border-radius:10px;margin-bottom:24px}
.pill{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;color:var(--text3);transition:0.2s}
.pill.active{background:var(--surface);color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;padding:16px}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:12px;white-space:pre-wrap;min-height:120px;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:none}
.btn-primary{background:var(--blue);color:#fff}
.page{display:none} .page.active{display:block}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <img src="https://carlosjaviergaleano1995-coder.github.io/iphone-club/icon-192.png">
    <h2>iPhone <span>Club</span></h2>
    <p style="font-size:11px;color:#6e6e73;margin-bottom:20px">ACCESO RESTRINGIDO</p>
    <div id="loginError" class="error-msg"></div>
    <div class="input-group">
      <label>Email</label>
      <input id="loginEmail" class="login-input" type="email" value="carlosjaviergaleano.1995@gmail.com">
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <input id="loginPass" class="login-input" type="password" placeholder="••••••••">
    </div>
    <button class="btn-login" onclick="window.doLogin()">Entrar</button>
    <button class="btn-google" onclick="window.doGoogleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16"> Entrar con Google
    </button>
  </div>
</div>

<div id="appShell">
    <div class="topbar">
      <div class="logo-name">iPhone <span>Club</span></div>
      <button class="btn" style="background:none; color:var(--blue); font-weight:600" onclick="window.doLogout()">Salir</button>
    </div>

    <div class="main">
        <div class="nav-pills">
            <div class="pill active" id="p-gen" onclick="goPage('generate')">Generar</div>
            <div class="pill" id="p-list" onclick="goPage('lists')">Mis Listas</div>
            <div class="pill" id="p-tmpl" onclick="goPage('templates')">Plantillas</div>
        </div>

        <div id="page-generate" class="page active">
            <div class="card">
                <div class="preview-box" id="genPreview">Generando lista...</div>
                <button class="btn btn-primary" style="width:100%; margin-top:15px" onclick="copyText()">Copiar para WhatsApp</button>
            </div>
        </div>

        <div id="page-lists" class="page">
            <div class="card">
                <h4 style="margin-bottom:10px">Gestión de Inventario</h4>
                <p style="font-size:12px; color:var(--text3)">Aquí aparecerán tus productos cargados.</p>
            </div>
        </div>

        <div id="page-templates" class="page">
            <div class="card">
                <h4 style="margin-bottom:10px">Plantillas de Mensaje</h4>
                <p style="font-size:12px; color:var(--text3)">Configura el formato de tus listas.</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBsL8sWUtxbG-KIC3ZzObUgKZTqhEMnf0",
  authDomain: "iphone-club-acf61.firebaseapp.com",
  projectId: "iphone-club-acf61",
  storageBucket: "iphone-club-acf61.firebasestorage.app",
  messagingSenderId: "989584681373",
  appId: "1:989584681373:web:2813015fb6f624b8c4f0e2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.doLogin = () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  signInWithEmailAndPassword(auth, email, pass).catch(() => showError("Verificá tus credenciales"));
};

window.doGoogleLogin = () => {
  signInWithPopup(auth, provider).catch(() => showError("Error con Google"));
};

window.doLogout = () => signOut(auth);

function showError(m) {
  const el = document.getElementById('loginError');
  el.textContent = m; el.style.display = 'block';
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists() && userDoc.data().role === 'admin') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').style.display = 'flex';
      renderGenerate();
    } else {
      showError("Acceso denegado");
      await signOut(auth);
    }
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appShell').style.display = 'none';
  }
});
</script>
