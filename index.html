<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Club — Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="iPhone Club">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* --- TODOS TUS ESTILOS ORIGINALES REUPERADOS --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#fff;--surface2:#f5f5f7;--surface3:#e8e8ed;
  --border:#d2d2d7;--border2:#c7c7cc;
  --text:#1d1d1f;--text2:#424245;--text3:#6e6e73;--text4:#aeaeb2;
  --blue:#0071e3;--blue2:#0077ed;--blue-bg:rgba(0,113,227,.08);--blue-ring:rgba(0,113,227,.2);
  --green:#34c759;--green-bg:rgba(52,199,89,.1);
  --red:#ff3b30;--red-bg:rgba(255,59,48,.08);
  --gold:#ff9f0a;--gold-bg:rgba(255,159,10,.1);
  --purple:#af52de;--purple-bg:rgba(175,82,222,.08);
  --r:12px;--r-sm:8px;--r-xs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Estilos de Login */
#loginScreen {
    position: fixed; inset: 0; z-index: 1000; background: var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 20px;
}
.login-card {
    background: #fff; border: 1px solid var(--border); border-radius: 18px;
    padding: 32px; width: 100%; max-width: 360px; box-shadow: var(--sh); text-align: center;
}
.btn-google {
    width: 100%; background: #fff; color: var(--text); border: 1px solid var(--border);
    padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer;
    margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;
}

/* Estructura del panel original */
.shell{display:none;flex-direction:column;min-height:100vh}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-name{font-size:16px;font-weight:700}
.logo-name span{color:var(--blue)}
.main{flex:1;max-width:900px;margin:0 auto;width:100%;padding:20px 16px 80px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.card-body{padding:14px 16px}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:12px;white-space:pre-wrap;min-height:120px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:none}
.btn-primary{background:var(--blue);color:#fff}
.error-banner { background: #fff2f2; color: #c62828; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: none; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div style="font-size:24px; font-weight:700; margin-bottom:8px;">iPhone <span style="color:var(--blue)">Club</span></div>
    <p style="font-size:13px; color:var(--text3); margin-bottom:24px;">Panel Administrativo</p>
    
    <div id="loginError" class="error-banner"></div>

    <button class="btn-google" onclick="window.doGoogleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar con Google
    </button>
    <p style="margin-top:20px; font-size:11px; color:var(--text4)">Solo personal autorizado de iPhone Club</p>
  </div>
</div>

<div class="shell" id="appShell">
    <div class="topbar">
      <div class="logo-name">iPhone <span>Club</span></div>
      <div style="display:flex; align-items:center; gap:12px">
          <span id="userName" style="font-size:12px; color:var(--text3)"></span>
          <button class="btn" style="background:var(--surface3)" onclick="window.doLogout()">Salir</button>
      </div>
    </div>

    <div class="main">
        <div class="section">
            <div style="font-size:11px; font-weight:600; text-transform:uppercase; color:var(--text3); margin-bottom:8px">Generador de Mensaje</div>
            <div class="card">
                <div class="card-body">
                    <div class="preview-box" id="genPreview">Cargando datos del panel...</div>
                    <div style="margin-top:12px; display:flex; gap:10px">
                        <button class="btn btn-primary" onclick="copyText()">Copiar Lista</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBsL8sWUtxbG-KiC3ZzObUgKZTLWRdu8Y",
  authDomain: "iphone-club-acf61.firebaseapp.com",
  projectId: "iphone-club-acf61",
  storageBucket: "iphone-club-acf61.firebasestorage.app",
  messagingSenderId: "989584681373",
  appId: "1:989584681373:web:2813015fb6f62483ba6774"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.doGoogleLogin = async () => {
    try {
        await signInWithPopup(auth, provider);
    } catch (e) {
        showError("Error al iniciar sesión con Google.");
    }
};

window.doLogout = () => signOut(auth);

function showError(m) {
    const el = document.getElementById('loginError');
    el.textContent = m; el.style.display = 'block';
}

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists() && userDoc.data().role === 'admin') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appShell').style.display = 'flex';
            document.getElementById('userName').textContent = user.displayName;
            document.getElementById('genPreview').textContent = "¡Hola " + user.displayName + "! El panel está listo para usar.";
        } else {
            showError("Acceso denegado: Tu usuario no tiene permisos de administrador.");
            await signOut(auth);
        }
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appShell').style.display = 'none';
    }
});

// Función de copia original
window.copyText = () => {
    const text = document.getElementById('genPreview').innerText;
    navigator.clipboard.writeText(text);
    alert("¡Copiado!");
};
</script>

<script>
// Registro de Service Worker original
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error', err));
  });
}
</script>

</body>
</html>
